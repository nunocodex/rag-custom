name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────
  # Lint: shellcheck + ruff
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          pip install ruff

      - name: Shellcheck
        run: shellcheck setup.sh setup.test.sh scheduler/scripts/update.sh

      - name: Ruff lint
        run: ruff check api/ collection/ tests/

  # ──────────────────────────────────────────────
  # Bash test suite
  # ──────────────────────────────────────────────
  bash-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run bash test suite
        run: bash setup.test.sh

  # ──────────────────────────────────────────────
  # Python unit/integration/structural tests
  # ──────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic==2.7.0 httpx==0.27.0 chromadb tenacity

      - name: Run Python tests
        run: python -m unittest discover tests -v

  # ──────────────────────────────────────────────
  # Docker build + Compose validation + Trivy scan
  # ──────────────────────────────────────────────
  build-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        run: docker compose build --parallel

      - name: List built images
        run: docker images --filter "reference=rag-*" --filter "reference=*collection*"

      - name: Install Trivy
        run: |
          sudo apt-get install -y -qq wget apt-transport-https
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y -qq trivy

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/trivy
          key: ${{ runner.os }}-trivy-db

      - name: Scan api image
        run: trivy image --severity CRITICAL,HIGH --exit-code 1 --no-progress rag-api:latest || true

      - name: Scan collection image
        run: trivy image --severity CRITICAL,HIGH --exit-code 1 --no-progress rag-collection:latest || true
