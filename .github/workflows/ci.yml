name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────
  # Quick bash test suite (setup.sh logic)
  # ──────────────────────────────────────────────
  bash-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run bash test suite
        run: bash setup.test.sh

  # ──────────────────────────────────────────────
  # Python unit/integration/structural tests
  # ──────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic==2.7.0 httpx==0.27.0 chromadb tenacity
          # chromadb and llama-index are not needed — tests use unittest.mock

      - name: Discover and run Python tests
        run: python -m unittest discover tests -v

  # ──────────────────────────────────────────────
  # Docker build validation (optional: check Dockerfiles are valid)
  # ──────────────────────────────────────────────

