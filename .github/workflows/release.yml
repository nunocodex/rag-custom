name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  PYTHON_VERSION: "3.12"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/api:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/api:main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Collection image
        uses: docker/build-push-action@v6
        with:
          context: ./collection
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/collection:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/collection:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/collection:main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Scheduler image
        uses: docker/build-push-action@v6
        with:
          context: ./scheduler
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/scheduler:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/scheduler:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rag-custom/scheduler:main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## ${{ steps.version.outputs.tag }}

            Docker images published to GHCR:

            - `ghcr.io/${{ env.IMAGE_OWNER }}/rag-custom/api:${{ steps.version.outputs.tag }}`
            - `ghcr.io/${{ env.IMAGE_OWNER }}/rag-custom/collection:${{ steps.version.outputs.tag }}`
            - `ghcr.io/${{ env.IMAGE_OWNER }}/rag-custom/scheduler:${{ steps.version.outputs.tag }}`
          generate_release_notes: true
